[build]
  # هذا يخبر Netlify أين توجد ملفاتك
  publish = "."

[functions]
  # هذا يخبر Netlify أن الدوال موجودة في مجلد api
  directory = "api"
  # إعداد اختياري لضمان توافق الـ Node.js
  node_bundler = "esbuild"

# هنا "السحر": تحويل الطلبات من /api/chat إلى الدالة مباشرة
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true
