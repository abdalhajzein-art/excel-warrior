<!DOCTYPE html>
<html>
<head>
    <title>Excel Warrior AI</title>
</head>
<body>
    <h2>ارفع ملف Excel</h2>

    <form action="/process" method="post" enctype="multipart/form-data">
        <input type="file" name="excel_file" accept=".xlsx,.xls" required>
        <br><br>

        <label>اكتب طلبك:</label><br>
        <textarea name="instruction" rows="10" cols="80" required></textarea>
        <br><br>

        <button type="submit">تنفيذ</button>
    </form>
</body>
</html>
