<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منصة الأثـــير</title>
  <link rel="stylesheet" href="style.css?v=2002">
</head>

<body>

  <div class="app-container">

    <header class="top-bar">
      <div class="title">AI الأثـــير</div>
      <div class="subtitle">مدعومة بـ الذكاء المتقدم</div>
    </header>

    <div class="control-bar">
      <button id="newChatBtn">جلسة جديدة</button>
      <button id="clearChatBtn">حذف المحادثة</button>
    </div>

    <div id="welcomeScreen" class="welcome-screen">
      <h1 class="welcome-title">منصّة الأثـــير</h1>
      <p class="welcome-subtitle">مرحبًا بك 👋</p>
      <p class="welcome-hint">ابدأ المحادثة الآن…</p>
    </div>

    <main id="chatArea" class="chat-area"></main>

    <!-- ============================
         INPUT AREA (UPDATED)
    ============================= -->
    <div class="input-area">

      <!-- NEW: صندوق الإرفاق -->
      <div id="attachmentBox" class="hidden"></div>

      <!-- زر الإرفاق -->
      <button id="attachBtn">📎</button>

      <!-- صندوق الكتابة -->
      <textarea id="userInput" placeholder="اكتب رسالتك هنا..." rows="1"></textarea>

      <!-- زر الإرسال -->
      <button id="sendBtn">إرسال</button>
    </div>

  </div>

  <script src="app.js?v=2002"></script>
</body>
</html>
