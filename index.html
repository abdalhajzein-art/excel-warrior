<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منصة الأثـــير</title>
  <link rel="stylesheet" href="style.css?v=3001">
</head>

<body>

  <div class="app-container">

    <!-- زر فتح/إغلاق السايدبار -->
    <button id="sidebarToggle" class="sidebar-toggle">☰</button>

    <!-- OVERLAY خلف السايدبار -->
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">الأثـــير</div>
        <div class="sidebar-sub">منصة ذكاء</div>
      </div>

      <!-- زر الجلسة الجديدة الأساسي -->
      <button class="sidebar-btn" id="newSessionBtn">جلسة جديدة</button>

      <div class="sidebar-section-title">الجلسات</div>
      <div id="sessionsList" class="sessions-list"></div>

      <div class="sidebar-footer">
        <div class="sidebar-mini">© 2026</div>
      </div>
    </aside>

    <!-- MAIN AREA -->
    <div class="main-area">

      <header class="top-bar">
        <div class="title">AI الأثـــير</div>
        <div class="subtitle">مدعومة بـ الذكاء المتقدم</div>
      </header>

      <div class="control-bar">
        <!-- هذا الزر صار Shortcut فقط -->
        <button id="newChatBtn">جلسة جديدة</button>
      </div>

      <div id="welcomeScreen" class="welcome-screen">
        <h1 class="welcome-title">منصّة الأثـــير</h1>
        <p class="welcome-subtitle">مرحبًا بك 👋</p>
        <p class="welcome-hint">ابدأ المحادثة الآن…</p>
      </div>

      <main id="chatArea" class="chat-area"></main>

      <!-- INPUT AREA -->
      <div class="input-area">

        <div id="fileBubbles" class="file-bubbles"></div>

        <div class="input-box">
          <button id="attachBtn" class="attach-icon">📎</button>

          <textarea id="userInput" placeholder="اكتب رسالتك هنا..." rows="1"></textarea>

          <button id="sendBtn" class="send-icon">➤</button>
        </div>

      </div>

    </div>

  </div>

   <script src="script.js?v=3001"></script>

</body>
</html>
