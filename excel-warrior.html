<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Excel Warrior – عبر سيرفر Railway</title>
  <style>
    body { font-family: sans-serif; direction: rtl; margin: 20px; }
    .box { border: 1px solid #ccc; padding: 15px; margin-bottom: 15px; border-radius: 8px; }
    button { padding: 8px 16px; margin-top: 10px; cursor: pointer; }
    textarea { width: 100%; height: 100px; }
    #log { white-space: pre-wrap; background: #f7f7f7; padding: 10px; border-radius: 6px; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>

  <h2>Excel Warrior – عبر سيرفر Railway</h2>

  <div class="box">
    <label>اختر ملف Excel:</label><br>
    <input type="file" id="fileInput" accept=".xlsx,.xls">
  </div>

  <div class="box">
    <label>اكتب طلبك للذكاء الاصطناعي:</label><br>
    <textarea id="prompt" placeholder="مثال: أضف عمود حالة الموظف"></textarea>
  </div>

  <div class="box">
    <button id="runBtn">شغّل Excel Warrior</button>
  </div>

  <div class="box">
    <strong>السجل / الحالة:</strong>
    <div id="log"></div>
  </div>

  <script>
    const PROXY_URL = "https://YOUR-RAILWAY-APP.up.railway.app/ai";

    const fileInput = document.getElementById("fileInput");
    const promptInput = document.getElementById("prompt");
    const runBtn = document.getElementById("runBtn");
    const logDiv = document.getElementById("log");

    function log(msg) {
      logDiv.textContent += msg + "\n";
    }

    function sheetToCSV(workbook) {
      const firstSheetName = workbook.SheetNames[0];
      const sheet = workbook.Sheets[firstSheetName];
      return XLSX.utils.sheet_to_csv(sheet);
    }

    function csvToWorkbook(csv) {
      const rows = csv.split("\n").map(r => r.split(","));
      const ws = XLSX.utils.aoa_to_sheet(rows);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Modified");
      return wb;
    }

    async function callProxy(csvData, userPrompt) {
      log("🔹 إرسال البيانات إلى سيرفر Railway...");

      const res = await fetch(PROXY_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ csv: csvData, prompt: userPrompt })
      });

      if (!res.ok) {
        const txt = await res.text();
        throw new Error("خطأ من السيرفر:\n" + txt);
      }

      const json = await res.json();
      return json.csv.trim();
    }

    function downloadWorkbook(workbook, filename) {
      const wbout = XLSX.write(workbook, { bookType: "xlsx", type: "array" });
      const blob = new Blob([wbout], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    runBtn.onclick = async () => {
      logDiv.textContent = "";

      const file = fileInput.files[0];
      if (!file) {
        log("❌ رجاءً اختر ملف Excel.");
        return;
      }

      const userPrompt = promptInput.value.trim();
      if (!userPrompt) {
        log("❌ رجاءً اكتب التعليمات.");
        return;
      }

      log("📂 قراءة ملف Excel...");

      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          const data = new Uint8Array(e.target.result);
          const workbook = XLSX.read(data, { type: "array" });

          log("🔄 تحويل الورقة إلى CSV...");
          const csv = sheetToCSV(workbook);

          log("🤖 إرسال CSV + التعليمات إلى السيرفر...");
          const modifiedCsv = await callProxy(csv, userPrompt);

          log("🧩 تحويل CSV المعدّل إلى Excel...");
          const newWorkbook = csvToWorkbook(modifiedCsv);

          log("💾 تحميل الملف المعدّل...");
          downloadWorkbook(newWorkbook, "excel-warrior-output.xlsx");

          log("🎉 تم إنشاء الملف بنجاح!");
        } catch (err) {
          log("❌ خطأ أثناء المعالجة:\n" + err.message);
        }
      };

      reader.readAsArrayBuffer(file);
    };
  </script>

</body>
  </html>
